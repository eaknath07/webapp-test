revolte:
  version: '1.0'
  project: test1
  appName: test2
  env:
    staging:
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web-app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    qa:
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web-app-service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: true
            variables:
              BASE_URL: /api/v1
              VITE_INFO: '#{info}'
    production:
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web-app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    preview:
      services:
        rid_1:
          type: WEB_APP
          name: web-app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
